version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stroyhub_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stroyhub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stroyhub_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-stroyhub}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stroyhub_user} -d ${POSTGRES_DB:-stroyhub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stroyhub_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stroyhub_user}:${POSTGRES_PASSWORD:-stroyhub_secure_pass}@db:5432/${POSTGRES_DB:-stroyhub}?schema=public
      PORT: 5000
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-stroyhub_dev_jwt_secret_local}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-5}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stroyhub_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_PROXY_TARGET: http://backend:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: stroyhub_admin
    restart: always
    ports:
      - "3001:3001"
    environment:
      VITE_API_PROXY_TARGET: http://backend:5000
    volumes:
      - ./admin:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
