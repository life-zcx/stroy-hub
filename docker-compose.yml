version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tormag_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tormag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tormag_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tormag}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tormag_user} -d ${POSTGRES_DB:-tormag}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: tormag_postgres_backup
    restart: always
    user: "postgres:postgres"
    volumes:
      - db_backups:/backups
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-tormag}
      - POSTGRES_USER=${POSTGRES_USER:-tormag_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tormag_secure_pass}
      - POSTGRES_PORT=5432
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6

  redis:
    image: redis:7-alpine
    container_name: tormag_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tormag_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tormag_user}:${POSTGRES_PASSWORD:-tormag_secure_pass}@db:5432/${POSTGRES_DB:-tormag}?schema=public
      PORT: 5000
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-tormag_dev_jwt_secret_local}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-5}
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tormag_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_PROXY_TARGET: http://backend:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: tormag_admin
    restart: always
    ports:
      - "3001:3001"
    environment:
      VITE_API_PROXY_TARGET: http://backend:5000
    volumes:
      - ./admin:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  db_backups:
    driver: local
