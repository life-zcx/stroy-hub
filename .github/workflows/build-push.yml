name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  OWNER_LC: life-zcx
  REPOSITORY_LC: stroy-hub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build and Push Backend Image
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.REPOSITORY_LC }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build and Push Gateway Image (Nginx + static frontend/admin)
      - name: Build and push Gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/nginx/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.REPOSITORY_LC }}/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
